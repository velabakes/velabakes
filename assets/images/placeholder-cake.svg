<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#FFF8EC" rx="16"/>
  <!-- Decorative Wreath Pattern Background -->
  <path d="M 50 150 Q 80 50 200 50 Q 320 50 350 150" fill="none" stroke="#1E5631" stroke-width="1" stroke-dasharray="4 6" opacity="0.2"/>

  <!-- Cake Slice Illustration -->
  <g transform="translate(140, 70)" stroke="#1E5631" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Slice Body -->
    <path d="M 10 110 L 110 50 L 110 110 Z" fill="#FFFFFF"/>
    <path d="M 10 110 L 70 140 L 70 80 L 10 110" />
    <path d="M 70 80 L 110 50" />
    <path d="M 70 140 L 110 110" />

    <!-- Cake Layers -->
    <path d="M 10 110 M 30 100 L 83 70" stroke-dasharray="2 2" />
    <path d="M 10 110 M 30 120 L 50 130" stroke-dasharray="2 2" />
    <path d="M 50 130 L 90 100" stroke-dasharray="2 2" />

    <!-- Cherry on top with Brand Red -->
    <circle cx="110" cy="35" r="8" fill="#C8102E" stroke="none" />
    <path d="M 110 27 Q 115 15 125 18" stroke="#1E5631" stroke-width="2" />
    
    <!-- Cream Dollop -->
    <path d="M 100 50 C 95 45, 105 40, 110 45 C 115 40, 125 45, 120 50 Z" fill="#FFF8EC" />
  </g>

  <!-- Leaf Accent -->
  <g transform="translate(80, 180) rotate(15)" stroke="#1E5631" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M 0 10 C 10 0, 20 0, 30 10 C 20 20, 10 20, 0 10 Z" fill="#1E5631" fill-opacity="0.1"/>
    <line x1="0" y1="10" x2="30" y2="10"/>
  </g>

  <text x="50%" y="260" font-family="'Poppins', sans-serif" font-size="16" font-weight="500" fill="#1E5631" text-anchor="middle" letter-spacing="1.5">CAKES &amp; ROLLS</text>
  <text x="50%" y="278" font-family="'Poppins', sans-serif" font-size="11" font-weight="400" fill="#C8102E" text-anchor="middle" letter-spacing="0.5">VELA BAKES STANDARD</text>
</svg>
