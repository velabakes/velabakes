<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#FFF8EC" rx="16"/>
  <!-- Decorative Wreath Pattern Background -->
  <path d="M 50 150 Q 80 50 200 50 Q 320 50 350 150" fill="none" stroke="#1E5631" stroke-width="1" stroke-dasharray="4 6" opacity="0.2"/>

  <!-- Flaky Puff (Triangle) -->
  <g transform="translate(100, 80)" stroke="#1E5631" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Flaky layers -->
    <polygon points="10,100 80,20 130,100" fill="#FFFFFF"/>
    <path d="M 25,85 L 115,85" />
    <path d="M 40,70 L 105,70" />
    <path d="M 55,50 L 95,50" />
    <!-- Fork scores / details -->
    <line x1="20" y1="95" x2="25" y2="85" />
    <line x1="120" y1="95" x2="115" y2="85" />
    <line x1="50" y1="95" x2="50" y2="85" />
    <line x1="90" y1="95" x2="90" y2="85" />
  </g>

  <!-- Cookie (Chocolate chip style) -->
  <g transform="translate(220, 120)" stroke="#1E5631" stroke-width="2.5" fill="none">
    <!-- Cookie Outer contour -->
    <path d="M 40 10 C 60 8, 75 20, 75 40 C 78 60, 60 72, 40 70 C 20 72, 5 60, 8 40 C 5 20, 20 8, 40 10 Z" fill="#C8102E" fill-opacity="0.05"/>
    <!-- Chocolate Chips -->
    <rect x="25" y="25" width="8" height="6" rx="2" fill="#1E5631" stroke="none" transform="rotate(15 25 25)"/>
    <rect x="45" y="20" width="7" height="7" rx="2" fill="#1E5631" stroke="none" transform="rotate(-10 45 20)"/>
    <rect x="52" y="45" width="9" height="5" rx="2" fill="#1E5631" stroke="none" transform="rotate(45 52 45)"/>
    <rect x="30" y="48" width="6" height="8" rx="2" fill="#1E5631" stroke="none"/>
    <rect x="18" y="38" width="6" height="6" rx="2" fill="#1E5631" stroke="none" transform="rotate(30 18 38)"/>
  </g>

  <text x="50%" y="260" font-family="'Poppins', sans-serif" font-size="16" font-weight="500" fill="#1E5631" text-anchor="middle" letter-spacing="1.5">COOKIES &amp; PUFFS</text>
  <text x="50%" y="278" font-family="'Poppins', sans-serif" font-size="11" font-weight="400" fill="#C8102E" text-anchor="middle" letter-spacing="0.5">VELA BAKES STANDARD</text>
</svg>
