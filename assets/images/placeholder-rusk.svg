<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#FFF8EC" rx="16"/>
  <!-- Decorative Wreath Pattern Background -->
  <path d="M 50 150 Q 80 50 200 50 Q 320 50 350 150" fill="none" stroke="#1E5631" stroke-width="1" stroke-dasharray="4 6" opacity="0.2"/>

  <!-- Rusk (Rectangular block) -->
  <g transform="translate(100, 90)" stroke="#1E5631" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Front Face -->
    <rect x="10" y="30" width="100" height="60" rx="6" fill="#FFFFFF"/>
    <!-- Top Face (3D effect) -->
    <path d="M 10 30 L 30 10 L 130 10 L 110 30" fill="#FFFFFF"/>
    <!-- Side Face -->
    <path d="M 110 30 L 130 10 L 130 70 L 110 90 Z" />
    
    <!-- Toast holes/texture -->
    <circle cx="30" cy="50" r="1.5" fill="#1E5631"/>
    <circle cx="50" cy="45" r="1.5" fill="#1E5631"/>
    <circle cx="70" cy="55" r="1.5" fill="#1E5631"/>
    <circle cx="90" cy="45" r="1.5" fill="#1E5631"/>
    <circle cx="40" cy="70" r="1.5" fill="#1E5631"/>
    <circle cx="60" cy="65" r="1.5" fill="#1E5631"/>
    <circle cx="80" cy="75" r="1.5" fill="#1E5631"/>
  </g>

  <!-- Biscuit (Round) -->
  <g transform="translate(230, 130)" stroke="#1E5631" stroke-width="2.5" fill="none">
    <circle cx="40" cy="40" r="30" fill="#C8102E" fill-opacity="0.05"/>
    <circle cx="40" cy="40" r="22" stroke-dasharray="3 3"/>
    <!-- Scalloped edges -->
    <path d="M 40 5 A 35 35 0 0 1 70 40" stroke-dasharray="1 4" stroke-width="4"/>
    <path d="M 70 40 A 35 35 0 0 1 40 75" stroke-dasharray="1 4" stroke-width="4"/>
    <path d="M 40 75 A 35 35 0 0 1 10 40" stroke-dasharray="1 4" stroke-width="4"/>
    <path d="M 10 40 A 35 35 0 0 1 40 5" stroke-dasharray="1 4" stroke-width="4"/>
    <!-- Holes in center -->
    <circle cx="32" cy="32" r="1.5" fill="#1E5631"/>
    <circle cx="48" cy="32" r="1.5" fill="#1E5631"/>
    <circle cx="32" cy="48" r="1.5" fill="#1E5631"/>
    <circle cx="48" cy="48" r="1.5" fill="#1E5631"/>
  </g>

  <text x="50%" y="260" font-family="'Poppins', sans-serif" font-size="16" font-weight="500" fill="#1E5631" text-anchor="middle" letter-spacing="1.5">RUSKS &amp; BISCUITS</text>
  <text x="50%" y="278" font-family="'Poppins', sans-serif" font-size="11" font-weight="400" fill="#C8102E" text-anchor="middle" letter-spacing="0.5">VELA BAKES STANDARD</text>
</svg>
